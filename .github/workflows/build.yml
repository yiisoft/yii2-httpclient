name: build

on:
  pull_request: &ignore-paths
    paths-ignore:
      - 'docs/**'
      - '.github/CONTRIBUTING.md'
      - '.github/FUNDING.yml'
      - '.github/SECURITY.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE.md'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - 'docker-compose.yml'
      - 'Makefile'

  push: *ignore-paths

permissions:
  contents: read
jobs:
  phpunit:
    uses: yiisoft/yii2-actions/.github/workflows/phpunit.yml@161a59a5e7d9c5b650c4a132f6e9292bacfcb5cc
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
